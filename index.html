<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Order Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="loader">
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="line"></div>
    </div>
    <div class="registratsiya">
        <div class="overlay">
            <div class="modal">

                <h2>ORDER</h2>

                <form action="movies.html">

                    <label>Name and surname</label>
                    <input type="text" >

                    <label>Email</label>
                    <input type="email" >

                    <label>Promo code</label>
                    <div class="row">
                        <input type="text">
                        <button type="button" class="small-btn">Apply</button>
                    </div>

                    <label>Cell phone</label>
                    <div class="row">
                        <span class="prefix">+998</span>
                        <input type="tel" placeholder="90 123 45 67" pattern="[0-9]{2} [0-9]{3} [0-9]{2} [0-9]{2}"
                            >
                    </div>

                    <label>Payment method</label>
                    <select >
                        <option>Visa</option>
                        <option>MasterCard</option>
                    </select>

                    <label>Card number</label>
                    <input type="text" >

                    <label>Expiry date</label>
                    <input type="month" >

                    <label>CVV</label>
                    <input type="password" >

                    <div class="check">
                        <input type="checkbox">
                        <span>Remember card information</span>
                    </div>

                    <button type="submit" class="main-btn">Purchase ($48)</button>

                </form>

            </div>
        </div>
    </div>

</body>

</html>
